[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Playwright settings
addopts = 
    -v
    --headed
    --slowmo=300
    --screenshot=on
    --video=retain-on-failure
    --output=reports/playwright
    --html=reports/report.html
    --self-contained-html
    --browser=chromium

# BDD settings
bdd_features_base_dir = features

# Markers
markers =
    smoke: Smoke tests (critical paths)
    regression: Full regression suite
    login: Login related tests
    dashboard: Dashboard tests
    critical: Critical business flows
    external: Tests that use external websites

# Logging
log_cli = true
log_cli_level = INFO